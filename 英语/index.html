<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>单词随机抽测 · 语境词库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f7ff;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            padding: 2rem 1.5rem;
            color: #1a2c3e;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 2rem;
            background: white;
            padding: 1rem 2rem;
            border-radius: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1f6e8c, #2c3e66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .stats {
            background: #eef2fa;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            color: #1f5e7a;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            background: white;
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #cbdde9;
        }

        .btn-primary {
            background: #2c6e9e;
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(44,110,158,0.3);
        }

        .btn-primary:hover {
            background: #1f5a82;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f4f9fe;
            border-color: #bdd4e4;
        }

        .btn-secondary:hover {
            background: #e6f0f8;
        }

        /* 单词卡区域 */
        .quiz-area {
            background: white;
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e2edf5;
            padding-bottom: 0.8rem;
        }

        .badge {
            background: #d9eaf3;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .word-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .word-card {
            background: #fefefe;
            border-radius: 1.5rem;
            padding: 1rem 1.2rem 1.2rem 1.2rem;
            transition: all 0.2s;
            border: 1px solid #e9f0f5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .word-card:hover {
            border-color: #caddf0;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
        }

        .word-en {
            font-size: 1.35rem;
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #1a4c6e;
            margin-bottom: 0.5rem;
            word-break: break-word;
            letter-spacing: -0.2px;
        }

        .word-input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            border: 1.5px solid #dfeaf2;
            font-size: 0.9rem;
            font-family: inherit;
            transition: 0.15s;
            background: #ffffff;
            margin: 0.5rem 0 0.4rem 0;
        }

        .word-input:focus {
            outline: none;
            border-color: #5b9bc5;
            box-shadow: 0 0 0 2px rgba(43, 110, 158, 0.2);
        }

        .feedback {
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .correct-badge {
            color: #1f8a4c;
            font-weight: 500;
        }

        .wrong-badge {
            color: #c44b3c;
        }

        .show-answer {
            background: none;
            border: none;
            color: #6c8dae;
            cursor: pointer;
            font-size: 0.7rem;
            text-decoration: underline;
            padding: 0 0.2rem;
        }

        .reference {
            font-size: 0.78rem;
            color: #3f6b8c;
            background: #f3f9ff;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
            margin-top: 0.2rem;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .result-summary {
            background: #eef3fc;
            border-radius: 2rem;
            padding: 1rem 2rem;
            text-align: center;
            font-weight: 500;
            margin-top: 1rem;
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #7b98ae;
            margin-top: 2rem;
        }

        @media (max-width: 680px) {
            body {
                padding: 1rem;
            }
            .word-list {
                grid-template-columns: 1fr;
            }
            .btn-group {
                width: 100%;
                justify-content: center;
            }
        }

        .empty-msg {
            text-align: center;
            padding: 3rem;
            color: #6d8eaa;
        }
    </style>
</head>

    const uniqueMap = new Map();
    for (const [word, meaning] of FULL_VOCAB) {
        if (!uniqueMap.has(word)) {
            uniqueMap.set(word, meaning);
        }
    }
    const MASTER_LIST = Array.from(uniqueMap.entries()).map(([word, meaning]) => ({ word, meaning }));
    const TOTAL_WORDS = MASTER_LIST.length;
    document.getElementById('totalCount').innerText = `📚 单词总数: ${TOTAL_WORDS}`;

    let currentQuiz = [];
    let answerStatus = new Map();

    function getRandomSubset() {
        const count = Math.max(1, Math.floor(TOTAL_WORDS * 0.15));
        const shuffled = [...MASTER_LIST];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    function renderQuiz(quizArray, showReferenceOnly = false) {
        const container = document.getElementById('quizContainer');
        if (!quizArray.length) {
            container.innerHTML = '<div class="empty-msg">✨ 点击按钮抽取单词，开始默写中文释义吧~</div>';
            document.getElementById('correctCountDisplay').innerHTML = '📝 正确: 0 / 0';
            document.getElementById('resultArea').style.display = 'none';
            return;
        }

        let html = '';
        quizArray.forEach((item, idx) => {
            const userVal = item.userAnswer || '';
            const status = answerStatus.get(item.word);
            let feedbackHtml = '';
            if (status === true) {
                feedbackHtml = `<span class="correct-badge">✓ 正确</span>`;
            } else if (status === false) {
                feedbackHtml = `<span class="wrong-badge">✗ 错误</span>
                                 <button class="show-answer" data-word="${item.word.replace(/['"]/g, '&quot;')}" data-meaning="${item.meaning.replace(/['"]/g, '&quot;')}">显示答案</button>`;
            }
            let referenceHtml = '';
            if (showReferenceOnly) {
                referenceHtml = `<div class="reference">📖 参考释义：${item.meaning}</div>`;
            } else if (status === undefined) {
                feedbackHtml = `<button class="show-answer" data-word="${item.word.replace(/['"]/g, '&quot;')}" data-meaning="${item.meaning.replace(/['"]/g, '&quot;')}">显示答案</button>`;
            }

            html += `
                <div class="word-card" data-wordkey="${item.word}">
                    <div class="word-en">${item.word}</div>
                    <input type="text" class="word-input" id="input-${idx}" placeholder="写出中文意思..." value="${escapeHtml(userVal)}" data-idx="${idx}" data-word="${item.word}">
                    <div class="feedback" id="feedback-${idx}">
                        ${feedbackHtml}
                        ${referenceHtml}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;

        document.querySelectorAll('.word-input').forEach(input => {
            input.addEventListener('input', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                const wordKey = e.target.dataset.word;
                const newVal = e.target.value.trim();
                if (currentQuiz[idx] && currentQuiz[idx].word === wordKey) {
                    currentQuiz[idx].userAnswer = newVal;
                    if (answerStatus.has(wordKey)) {
                        answerStatus.delete(wordKey);
                        const feedbackDiv = document.getElementById(`feedback-${idx}`);
                        if (feedbackDiv) {
                            feedbackDiv.innerHTML = `<button class="show-answer" data-word="${wordKey.replace(/['"]/g, '&quot;')}" data-meaning="${currentQuiz[idx].meaning.replace(/['"]/g, '&quot;')}">显示答案</button>`;
                            attachShowAnswerEvents();
                        }
                    }
                }
                updateCorrectCounter();
            });
        });
        attachShowAnswerEvents();
        updateCorrectCounter();
    }

    function attachShowAnswerEvents() {
        document.querySelectorAll('.show-answer').forEach(btn => {
            btn.removeEventListener('click', handleShowAnswer);
            btn.addEventListener('click', handleShowAnswer);
        });
    }
    function handleShowAnswer(e) {
        const meaning = e.currentTarget.dataset.meaning;
        const parentFeedback = e.currentTarget.closest('.feedback');
        if (parentFeedback && !parentFeedback.querySelector('.reference')) {
            const refSpan = document.createElement('div');
            refSpan.className = 'reference';
            refSpan.innerText = `📖 参考释义：${meaning}`;
            parentFeedback.appendChild(refSpan);
            e.currentTarget.style.display = 'none';
        }
    }

    function updateCorrectCounter() {
        if (!currentQuiz.length) return;
        let correctCount = 0;
        currentQuiz.forEach(item => {
            if (answerStatus.get(item.word) === true) correctCount++;
        });
        document.getElementById('correctCountDisplay').innerHTML = `📝 正确: ${correctCount} / ${currentQuiz.length}`;
        const resultDiv = document.getElementById('resultArea');
        if (correctCount === currentQuiz.length && currentQuiz.length>0) {
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `🎉 太棒了！全部 ${currentQuiz.length} 个单词都正确！🎉`;
        } else if (correctCount !== currentQuiz.length && currentQuiz.length) {
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `📌 当前正确 ${correctCount}/${currentQuiz.length}，继续加油～`;
        } else {
            resultDiv.style.display = 'none';
        }
    }

    function checkAllAnswers() {
        if (!currentQuiz.length) return;
        for (let i = 0; i < currentQuiz.length; i++) {
            const item = currentQuiz[i];
            const userAnswer = (item.userAnswer || '').trim().toLowerCase();
            const correctMeaning = item.meaning.toLowerCase();
            const isCorrect = userAnswer !== '' && (correctMeaning.includes(userAnswer) || userAnswer === correctMeaning || (userAnswer.length>1 && correctMeaning.includes(userAnswer)));
            answerStatus.set(item.word, isCorrect ? true : false);
        }
        renderQuiz(currentQuiz, false);
        updateCorrectCounter();
    }

    function resetCurrentInputs() {
        if (!currentQuiz.length) return;
        currentQuiz.forEach(item => { item.userAnswer = ''; });
        answerStatus.clear();
        renderQuiz(currentQuiz, false);
    }

    function showAllReferences() {
        if (!currentQuiz.length) return;
        renderQuiz(currentQuiz, true);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function drawRandom() {
        const subset = getRandomSubset();
        currentQuiz = subset.map(item => ({
            word: item.word,
            meaning: item.meaning,
            userAnswer: '',
        }));
        answerStatus.clear();
        renderQuiz(currentQuiz, false);
        const samplePercent = (currentQuiz.length / TOTAL_WORDS * 100).toFixed(1);
        document.getElementById('sampleInfo').innerHTML = `🎯 本次抽取 ${currentQuiz.length} 个单词 (${samplePercent}%)`;
    }

    document.getElementById('randomBtn').addEventListener('click', drawRandom);
    document.getElementById('checkAllBtn').addEventListener('click', checkAllAnswers);
    document.getElementById('resetQuizBtn').addEventListener('click', resetCurrentInputs);
    document.getElementById('revealAllBtn').addEventListener('click', showAllReferences);

    drawRandom();
</script>
